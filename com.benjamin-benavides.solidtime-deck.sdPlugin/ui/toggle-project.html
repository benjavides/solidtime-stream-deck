<!DOCTYPE html>
<html>

<head lang="en">
    <title>Solidtime Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
        .flex-container {
            display: flex;
            align-items: center;
        }
        .flex-grow {
            flex-grow: 1;
        }
        .flex-shrink {
            flex-shrink: 0;
            margin-left: 8px;
        }
    </style>
</head>

<body>
    <sdpi-item label="Solidtime URL">
        <sdpi-textfield 
            global 
            setting="solidtimeBaseUrl" 
            placeholder="e.g., https://app.solidtime.io/api" 
            required>
        </sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Access Token">
        <sdpi-password 
            global 
            setting="accessToken" 
            required>
        </sdpi-password>
    </sdpi-item>

    <sdpi-item label="Organization">
        <!-- Wrap in flex-container to add the button -->
        <div class="flex-container">
            <div class="flex-grow">
                <sdpi-select
                    global
                    id="org-select"
                    setting="organizationId"
                    datasource="getOrganizations"
                    loading="Fetching..."
                    placeholder="Enter credentials first">
                </sdpi-select>
            </div>
            <div class="flex-shrink">
                <!-- Add the organization refresh button -->
                <sdpi-button id="org-refresh-btn">Refresh</sdpi-button>
            </div>
        </div>
    </sdpi-item>

    <sdpi-item label="Project">
        <div class="flex-container">
            <div class="flex-grow">
                <sdpi-select
                    id="project-select"
                    setting="projectId"
                    datasource="getProjects"
                    loading="Fetching projects..."
                    placeholder="Select a project">
                </sdpi-select>
            </div>
            <div class="flex-shrink">
                <sdpi-button id="project-refresh-btn">Refresh</sdpi-button>
            </div>
        </div>
    </sdpi-item>
    
    <sdpi-item label="Title Display" title="Configure the button's title text and timer visibility.">
        <div class="flex-container">
            <div class="flex-grow">
                <sdpi-textfield setting="titleOverride" placeholder="Optional override"></sdpi-textfield>
            </div>
            <div class="flex-shrink">
                <!-- The label is now an attribute of the component -->
                <sdpi-checkbox setting="showElapsedTime" default="true" label="Show Time"></sdpi-checkbox>
            </div>
        </div>
    </sdpi-item>

    <sdpi-item label="Billable" title="Mark time entries as billable by default for this project.">
        <sdpi-checkbox setting="billable" default="true"></sdpi-checkbox>
    </sdpi-item>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const projectSelect = document.getElementById('project-select');
            const orgSelect = document.getElementById('org-select');
            const orgRefreshBtn = document.getElementById('org-refresh-btn');
            const projectRefreshBtn = document.getElementById('project-refresh-btn');

            if (orgRefreshBtn && orgSelect) {
                orgRefreshBtn.addEventListener('click', () => {
                    orgSelect.refresh();
                });
            }
            
            if (projectRefreshBtn && projectSelect) {
                projectRefreshBtn.addEventListener('click', () => {
                    projectSelect.refresh();
                });
            }

            // When the organization selection changes, automatically refresh the project list.
            if (orgSelect && projectSelect) {
                orgSelect.addEventListener('change', () => {
                    projectSelect.refresh();
                });
            }
        });
    </script>
</body>
</html>
