<!DOCTYPE html>
<html>

<head lang="en">
    <title>Solidtime Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
        /* Add some styling for the refresh button layout */
        .flex-container {
            display: flex;
            align-items: center;
        }
        .flex-grow {
            flex-grow: 1;
        }
        .flex-shrink {
            flex-shrink: 0;
            margin-left: 8px; /* space between dropdown and button */
        }
    </style>
</head>

<body>
    <sdpi-item label="Solidtime URL">
        <sdpi-textfield 
            global 
            setting="solidtimeBaseUrl" 
            placeholder="e.g., https://app.solidtime.io/api" 
            required>
        </sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Access Token">
        <sdpi-password 
            global 
            setting="accessToken" 
            required>
        </sdpi-password>
    </sdpi-item>

    <sdpi-item label="Project">
        <div class="flex-container">
            <div class="flex-grow">
                <sdpi-select
                    id="project-select"
                    setting="projectId"
                    datasource="getProjects"
                    loading="Fetching projects..."
                    placeholder="Select a project">
                </sdpi-select>
            </div>
            <div class="flex-shrink">
                <sdpi-button id="refresh-btn">Refresh</sdpi-button>
            </div>
        </div>
    </sdpi-item>

    <script>
        // Wait for the document and SDPI components to be fully loaded.
        document.addEventListener('DOMContentLoaded', () => {
            const projectSelect = document.getElementById('project-select');
            const refreshBtn = document.getElementById('refresh-btn');

            refreshBtn.addEventListener('click', () => {
                // The refresh() method is built into the sdpi-select component.
                // It re-triggers the 'getProjects' datasource request.
                projectSelect.refresh();
            });
        });
    </script>
</body>
</html>
